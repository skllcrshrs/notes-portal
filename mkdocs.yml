site_name: Kiln
site_description: Reverse Engineering Knowledge Base
site_url: https://skllcrshrs.github.io/kiln/
repo_url: https://github.com/skllcrshrs/kiln
repo_name: skllcrshrs/kiln

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: default
    primary: white
    accent: blue
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.prune
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/sidebar-toggle.js
  - javascripts/ascii-bg.js

plugins:
  - search

nav:
  - Books:
      - books/index.md
      - Modern x86 Assembly Language Programming:
          - books/modern-x86/index.md
          - Chapter 1: books/modern-x86/chapter-01.md
          - Chapter 2: books/modern-x86/chapter-02.md
      - Reverse Engineering for Beginners: books/re4b/index.md
      - Practical Reverse Engineering: books/pre/index.md
      - Practical Binary Analysis: books/pba/index.md
      - "Reversing: Secrets of Reverse Engineering": books/reversing/index.md
      - "Computer Systems: A Programmer's Perspective": books/csapp/index.md

  - Tools:
      - tools/index.md
      - Radare2: tools/radare2/index.md

  - Courses:
      - courses/index.md
      - Investigating Windows Endpoints: courses/windows-endpoints/index.md
      - Investigating Windows Memory: courses/windows-memory/index.md
      - Investigating Linux Devices: courses/linux-devices/index.md
      - Investigating macOS Endpoints: courses/macos-endpoints/index.md

  - Writeups:
      - writeups/index.md
