site_name: skullcrushers
site_description: Reverse Engineering, Assembly, Systems Programming and Debugging Notes
site_url: https://skllcrshrs.github.io/notes-portal/

theme:
  name: material
  logo: assets/images/logo.png
  font: false
  palette:
    scheme: default
    primary: white
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/sidebar-toggle.js

plugins:
  - search

nav:
  - RE:
      - RE: re/index.md

  - RE4B:
      - RE4B: re4b/index.md

  - CSAPP:
      - CSAPP: csapp/index.md

  - Modern x86:
      - Modern x86: modern-x86/index.md

  - PBA:
      - PBA: pba/index.md

  - Reversing:
      - Reversing: reversing/index.md

  - Radare2:
      - Radare2: radare2/index.md