site_name: skullcrushers
site_description: Reverse Engineering, Assembly, Systems Programming and Debugging Notes
site_url: https://skllcrshrs.github.io/notes-portal/
repo_url: https://github.com/skllcrshrs/notes-portal
repo_name: skllcrshrs/notes-portal

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

theme:
  name: material
  logo: assets/images/logo.png
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/sidebar-toggle.js

plugins:
  - search

nav:
  - RE:
      - RE: re/index.md

  - RE4B:
      - RE4B: re4b/index.md

  - CSAPP:
      - CSAPP: csapp/index.md

  - Modern x86:
      - Modern x86: modern-x86/index.md

  - PBA:
      - PBA: pba/index.md

  - Reversing:
      - Reversing: reversing/index.md

  - Radare2:
      - Radare2: radare2/index.md
