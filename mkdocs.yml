site_name: Kiln
site_description: Reverse Engineering and Systems Programming Knowledge Base
site_url: https://skllcrshrs.github.io/kiln/
repo_url: https://github.com/skllcrshrs/kiln
repo_name: skllcrshrs/kiln

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

theme:
  name: material
  logo: assets/images/logo.png
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/sidebar-toggle.js

plugins:
  - search

nav:
  - Reverse Engineering:
      - re/index.md
      - Crackmes.one:
          - re/crackmes/index.md
          - Writeup: re/crackmes/writeup.md
      - Books:
          - re/books/index.md
          - Modern x86 Assembly Language Programming:
              - re/books/modern-x86/index.md
              - Chapter 1: re/books/modern-x86/chapter-01.md
              - Chapter 2: re/books/modern-x86/chapter-02.md
          - Reverse Engineering for Beginners: re/books/re4b/index.md
          - Practical Reverse Engineering: re/books/pre/index.md
          - Practical Binary Analysis: re/books/pba/index.md
          - "Reversing: Secrets of Reverse Engineering": re/books/reversing/index.md
          - "Computer Systems: A Programmer's Perspective": re/books/csapp/index.md
      - Radare2: re/radare2/index.md

  - Digital Forensics:
      - df/index.md
      - Investigating Windows Endpoints: df/windows-endpoints/index.md
      - Investigating Windows Memory: df/windows-memory/index.md
      - Investigating Linux Devices: df/linux-devices/index.md
      - Investigating macOS Endpoints: df/macos-endpoints/index.md
